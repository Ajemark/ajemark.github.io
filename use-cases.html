    function renderTOC() {
      const toc = document.getElementById('toc');
      toc.innerHTML = caseStudies.map((c, i) => `
        <a href="#${c.id}" class="uc-toc-item">
          <span class="num">${i + 1}</span>${c.name}
        </a>
      `).join('');
    }

    function renderCases() {
      const container = document.getElementById('cases');
      container.innerHTML = caseStudies.map(c => {
        const links = [];
        if (c.links.live) links.push(`<a href="${c.links.live}" target="_blank">Live Demo →</a>`);
        if (c.links.github) links.push(`<a href="${c.links.github}" target="_blank">GitHub →</a>`);
        if (c.links.private) links.push(`<span style="color:#78716c;font-size:0.875rem;">🔒 Private Repo</span>`);

        return `
        <section class="uc-section" id="${c.id}">
          <div class="uc-header">
            <h2>${c.name}</h2>
            <div class="uc-badges">
              <span class="uc-badge uc-badge-${c.category}">${c.category.toUpperCase()}</span>
              <span class="uc-badge uc-badge-${c.niche}">${c.niche.toUpperCase()}</span>
            </div>
          </div>
          <div class="uc-meta">
            <span>👤 ${c.role}</span>
            <span>📊 ${c.status}</span>
          </div>
          <div class="uc-block">
            <h3>Overview</h3>
            <p>${c.overview}</p>
          </div>
          <div class="uc-block">
            <h3>Challenge</h3>
            <p>${c.challenge}</p>
          </div>
          <div class="uc-block">
            <h3>Solution</h3>
            <p>${c.solution}</p>
          </div>
          <div class="uc-block">
            <h3>Architecture</h3>
            <div class="uc-arch">${c.architecture}</div>
          </div>
          <div class="uc-block">
            <h3>Technologies</h3>
            <div class="uc-tech">${c.tech.map(t => `<span>${t}</span>`).join('')}</div>
          </div>
          <div class="uc-block">
            <h3>Key Features</h3>
            <ul>${c.features.map(f => `<li>${f}</li>`).join('')}</ul>
          </div>
          <div class="uc-block">
            <h3>Metrics</h3>
            <div class="uc-tech">${c.metrics.map(m => `<span>${m}</span>`).join('')}</div>
          </div>
          <div class="uc-links">
            ${links.join('')}
          </div>
        </section>
        `;
      }).join('');
    }
